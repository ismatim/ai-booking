version: "3.9"

services:
  app:
    build: .
    container_name: ai-booking-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      # Mount credentials file if using file-based Google credentials
      - ./credentials:/app/credentials:ro

networks:
  default:
    name: ai-booking-network
